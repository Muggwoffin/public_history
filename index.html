<body>
    <div class="landing-bg" aria-hidden="true"></div>
    <h1 class="sr-only">Dr Maurice J. Casey — Historian &amp; Writer</h1>

    <div class="landing-container">
        <!-- Masthead with surrounding section prints -->
        <div class="masthead-layout">
            <!-- About - Left -->
            <a href="main.html#about" class="image-card card-left" aria-label="About">
                <div class="image-wrapper">
                    <img src="images/street-scene.jpg" alt="About">
                </div>
                <h2 class="image-caption">About</h2>
            </a>

            <!-- Books - Top Left -->
            <a href="main.html#books" class="image-card card-top-left" aria-label="Books">
                <div class="image-wrapper">
                    <img src="images/mother-child.jpg" alt="Books">
                </div>
                <h2 class="image-caption">Books</h2>
            </a>

            <!-- Selected Writing - Top Right -->
            <a href="main.html#selected-writing" class="image-card card-top-right" aria-label="Selected Writing">
                <div class="image-wrapper">
                    <img src="images/research.jpg" alt="Selected Writing">
                </div>
                <h2 class="image-caption">Selected Writing</h2>
            </a>

            <!-- Contact - Right -->
            <a href="main.html#contact" class="image-card card-right" aria-label="Contact">
                <div class="image-wrapper">
                    <img src="images/children-garden.jpg" alt="Contact">
                </div>
                <h2 class="image-caption">Contact</h2>
            </a>

            <!-- Public History - Bottom Left -->
            <a href="main.html#public-history" class="image-card card-bottom-left" aria-label="Public History">
                <div class="image-wrapper">
                    <img src="images/guinguette.jpg" alt="Public History">
                </div>
                <h2 class="image-caption">Public History</h2>
            </a>

            <!-- Newsletter - Bottom Right -->
            <a href="main.html#newsletter" class="image-card card-bottom-right" aria-label="Newsletter">
                <div class="image-wrapper">
                    <img src="images/isk-1926.jpg" alt="Newsletter">
                </div>
                <h2 class="image-caption">Newsletter</h2>
            </a>

            <!-- Center Masthead -->
            <header class="title-section">
                <a href="main.html" class="masthead-link">
                    <img src="images/masthead.png" alt="Dr Maurice J. Casey - Historian & Writer" class="masthead-image">
                </a>
                <div class="masthead-ornament" aria-hidden="true">
                    <span class="rule"></span>
                    <span class="star">★</span>
                    <span class="rule"></span>
                </div>
            </header>
        </div>
    </div>
